name: Publish blog-cli

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    env:
      MONGO_URI: mongodb://localhost:27017

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out API server for integration tests
        uses: actions/checkout@v4
        with:
          repository: tanaka-mambinge/personal-server
          path: personal-server

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run pytest -v

      - name: Build distributions
        run: uv build --no-sources

      - name: Publish to PyPI
        run: uv publish
